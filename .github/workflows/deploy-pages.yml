# Objavi vsebino mape site/ na GitHub Pages ob vsakem pushu na main.
#
# Pages zna sam streči samo iz korena repozitorija ali iz mape docs/, naša stran
# pa živi v site/. Zato objavo opravi ta workflow: vzame site/ in ga postreže kot
# koren. Posledica je, da se stran posodobi sama ob vsakem pushu — ničesar ni
# treba ročno prenašati.

name: Objava na GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Hkrati naj teče samo ena objava; tekoče ne prekinjamo, da se ne objavi na pol.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Prevzemi repozitorij
        uses: actions/checkout@v4

      - name: Pripravi Pages
        uses: actions/configure-pages@v5

      - name: Zapakiraj mapo site/
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Objavi
        id: deployment
        uses: actions/deploy-pages@v4
